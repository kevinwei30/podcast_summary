name: Daily Podcast Summary

on:
  schedule:
    - cron: '30 1 * * 1-5'  # 09:30 Asia/Taipei (UTC+8), Mon-Fri
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3.11 python3.11-venv python3-pip ffmpeg
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 1
          python --version

      - name: Install dependencies
        run: pip install feedparser openai anthropic requests python-dotenv playwright
      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run summarizer
        run: python podcast_summarizer.py --verbose
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_DISPLAY_NAME: ${{ secrets.GMAIL_DISPLAY_NAME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
