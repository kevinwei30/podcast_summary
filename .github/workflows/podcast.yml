name: Daily Podcast Summary

on:
  schedule:
    - cron: '30 1 * * 1-5'  # 09:30 Asia/Taipei (UTC+8), Mon-Fri
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python3 --version

      - name: Install dependencies
        run: pip3 install feedparser openai anthropic requests python-dotenv playwright PyPTT
      - name: Install Playwright browser
        run: python3 -m playwright install chromium

      - name: Run summarizer
        run: python3 podcast_summarizer.py --verbose
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_DISPLAY_NAME: ${{ secrets.GMAIL_DISPLAY_NAME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PTT_ID: ${{ secrets.PTT_ID }}
          PTT_PASSWORD: ${{ secrets.PTT_PASSWORD }}
          PTT_BOARD: ${{ secrets.PTT_BOARD }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
